<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dialateliers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f9f6f1;
      --ink: #1a1814;
      --gold: #b89a6a;
      --muted: #8a8278;
      --border: #d8d2c8;
    }

    html { font-size: 16px; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      overflow-x: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(184,154,106,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(184,154,106,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 64px;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
      display: block;
      margin-bottom: 6px;
    }

    .brand-rule {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 20px auto;
    }

    .slogan {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: var(--muted);
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 1s ease both;
    }
    .field:nth-child(1) { animation-delay: .1s; }
    .field:nth-child(2) { animation-delay: .2s; }
    .field:nth-child(3) { animation-delay: .3s; }
    .field:nth-child(4) { animation-delay: .4s; }

    label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      width: 100%;
      transition: border-color 0.3s ease;
      -webkit-appearance: none;
    }

    input::placeholder, textarea::placeholder {
      color: var(--border);
    }

    input:focus, textarea:focus {
      border-bottom-color: var(--gold);
    }

    textarea {
      resize: none;
      height: 100px;
      line-height: 1.7;
    }

    /* Row for name + phone */
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    /* Submit */
    .submit-wrap {
      margin-top: 16px;
      animation: fadeUp 1s ease both;
      animation-delay: .5s;
    }

    button[type="submit"] {
      background: var(--ink);
      color: var(--cream);
      border: none;
      padding: 16px 48px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      width: 100%;
    }

    button[type="submit"]:hover {
      background: var(--gold);
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    /* Success state */
    .success-msg {
      display: none;
      text-align: center;
      padding: 48px 0;
      animation: fadeUp .6s ease both;
    }

    .success-msg.show { display: block; }

    .success-icon {
      width: 40px;
      height: 40px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .success-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--gold);
    }

    .success-msg p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* Footer */
    footer {
      margin-top: 72px;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--border);
      text-transform: uppercase;
      animation: fadeUp 1s ease .6s both;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <span class="brand">dialateliers</span>
      <div class="brand-rule"></div>
      <p class="slogan">Unsere Zeitmesser sind auf Anfrage erhältlich.<br>Hinterlassen Sie Ihre Kontaktdaten,<br>wir melden uns persönlich bei Ihnen.</p>
    </header>

    <form id="contactForm" action="https://formspree.io/f/DEINE_FORMSPREE_ID" method="POST">
      <div class="row">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Ihr Name" required>
        </div>
        <div class="field">
          <label for="phone">Telefon</label>
          <input type="tel" id="phone" name="phone" placeholder="+49 ...">
        </div>
      </div>

      <div class="field">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" placeholder="ihre@email.de" required>
      </div>

      <div class="field">
        <label for="message">Nachricht <span style="opacity:.5">(optional)</span></label>
        <textarea id="message" name="message" placeholder="Was interessiert Sie?"></textarea>
      </div>

      <div class="submit-wrap">
        <button type="submit">Anfrage senden</button>
      </div>
    </form>

    <div class="success-msg" id="successMsg">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <p>Vielen Dank.<br>Wir melden uns persönlich bei Ihnen.</p>
    </div>

    <footer>
      &copy; 2026 dialateliers
    </footer>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const success = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.textContent = '...';
      btn.disabled = true;

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          form.style.display = 'none';
          success.classList.add('show');
        } else {
          btn.textContent = 'Fehler – bitte erneut versuchen';
          btn.disabled = false;
        }
      } catch {
        btn.textContent = 'Fehler – bitte erneut versuchen';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
